# Remap prefix from C-b to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Scroll sends arrow keys to the terminal (scrolls output, not command history)
# In copy mode, scroll normally through the scrollback buffer
bind -n WheelUpPane if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t= ; copy-mode -e ; send-keys -M"
bind -n WheelDownPane if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t= ; send-keys -M"

# 256 colors + true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Increase scrollback
set -g history-limit 10000

# Reduce escape delay (better for vim/neovim)
set -sg escape-time 10

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar
set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-left " #S "
set -g status-right " %H:%M "
set -g status-left-length 20
